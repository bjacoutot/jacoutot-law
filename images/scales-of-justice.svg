<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <g transform="rotate(-20, 200, 250)">
    <!-- Central post -->
    <rect x="194" y="60" width="12" height="280" fill="#b8922a"/>
    <!-- Crossbar -->
    <rect x="98" y="88" width="204" height="10" rx="5" fill="#b8922a"/>

    <!-- Top finial -->
    <rect x="194" y="26" width="12" height="34" fill="#b8922a"/>
    <circle cx="200" cy="56" r="13" fill="#b8922a"/>
    <circle cx="200" cy="22" r="9" fill="#b8922a"/>

    <!-- Base stack -->
    <rect x="148" y="338" width="104" height="10" rx="5" fill="#b8922a"/>
    <rect x="165" y="348" width="70" height="8" rx="4" fill="#b8922a"/>
    <rect x="125" y="356" width="150" height="12" rx="6" fill="#b8922a"/>
    <rect x="105" y="368" width="190" height="10" rx="5" fill="#b8922a"/>

    <!-- Left chain -->
    <line x1="100" y1="93" x2="76" y2="202" stroke="#b8922a" stroke-width="5" stroke-linecap="round"/>
    <!-- Right chain -->
    <line x1="300" y1="93" x2="324" y2="202" stroke="#b8922a" stroke-width="5" stroke-linecap="round"/>

    <!-- Left pan -->
    <path d="M36 202 Q76 236 116 202" stroke="#b8922a" stroke-width="6" stroke-linecap="round" fill="none"/>
    <line x1="76" y1="202" x2="36" y2="202" stroke="#b8922a" stroke-width="4"/>
    <line x1="76" y1="202" x2="116" y2="202" stroke="#b8922a" stroke-width="4"/>

    <!-- Right pan (slightly lower) -->
    <path d="M284 212 Q324 246 364 212" stroke="#b8922a" stroke-width="6" stroke-linecap="round" fill="none"/>
    <line x1="324" y1="202" x2="284" y2="212" stroke="#b8922a" stroke-width="4"/>
    <line x1="324" y1="202" x2="364" y2="212" stroke="#b8922a" stroke-width="4"/>
  </g>
</svg>
