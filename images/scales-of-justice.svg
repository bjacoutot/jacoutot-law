<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Central beam / top crossbar -->
  <rect x="196" y="60" width="8" height="280" fill="#b8922a"/>
  <rect x="100" y="90" width="200" height="7" rx="3.5" fill="#b8922a"/>

  <!-- Top finial -->
  <circle cx="200" cy="58" r="10" fill="#b8922a"/>
  <rect x="196" y="30" width="8" height="30" fill="#b8922a"/>
  <circle cx="200" cy="26" r="7" fill="#b8922a"/>

  <!-- Base -->
  <rect x="150" y="338" width="100" height="8" rx="4" fill="#b8922a"/>
  <rect x="170" y="346" width="60" height="6" rx="3" fill="#b8922a"/>
  <rect x="130" y="352" width="140" height="10" rx="5" fill="#b8922a"/>
  <rect x="110" y="362" width="180" height="8" rx="4" fill="#b8922a"/>

  <!-- Left chain -->
  <line x1="100" y1="93" x2="80" y2="200" stroke="#b8922a" stroke-width="3" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="300" y1="93" x2="320" y2="200" stroke="#b8922a" stroke-width="3" stroke-linecap="round"/>

  <!-- Left pan -->
  <path d="M40 200 Q80 230 120 200" stroke="#b8922a" stroke-width="4" stroke-linecap="round" fill="none"/>
  <line x1="40" y1="200" x2="40" y2="204" stroke="#b8922a" stroke-width="3"/>
  <line x1="120" y1="200" x2="120" y2="204" stroke="#b8922a" stroke-width="3"/>

  <!-- Right pan (slightly lower for realism) -->
  <path d="M280 207 Q320 237 360 207" stroke="#b8922a" stroke-width="4" stroke-linecap="round" fill="none"/>
  <line x1="280" y1="207" x2="280" y2="211" stroke="#b8922a" stroke-width="3"/>
  <line x1="360" y1="207" x2="360" y2="211" stroke="#b8922a" stroke-width="3"/>

  <!-- Left pan suspension lines -->
  <line x1="80" y1="200" x2="40" y2="200" stroke="#b8922a" stroke-width="2.5"/>
  <line x1="80" y1="200" x2="120" y2="200" stroke="#b8922a" stroke-width="2.5"/>

  <!-- Right pan suspension lines -->
  <line x1="320" y1="200" x2="280" y2="207" stroke="#b8922a" stroke-width="2.5"/>
  <line x1="320" y1="200" x2="360" y2="207" stroke="#b8922a" stroke-width="2.5"/>
</svg>
